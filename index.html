<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JCC Lazer Tracking</title>

<style>
body {
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    font-family: Arial, sans-serif;
    color:#fff;
}

.card {
    width:380px;
    padding:40px 30px;
    border-radius:20px;
    background:#0f0f0f;
    border:1px solid rgba(255,255,255,0.05);
    box-shadow: 0 0 60px rgba(255,80,0,0.25);
    transition:0.4s;
}

.delivered {
    animation: glowPulse 1.5s ease-in-out infinite alternate;
}
@keyframes glowPulse {
    from { box-shadow: 0 0 10px rgba(0,255,150,0.3); }
    to { box-shadow: 0 0 30px rgba(0,255,150,0.9); }
}

.delivered-text {
    color:#00ff9c !important;
    font-weight:600;
}

.progress-full {
    width:100% !important;
}

.card h2 {
    text-align:center;
}
.sub {
    text-align:center;
    color:#888;
    margin-bottom:20px;
}

#searchBox {
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid #222;
    background:#0a0a0a;
    color:#fff;
    margin-bottom:10px;
}

button {
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#ff3c00,#ff7a00);
    color:#fff;
    cursor:pointer;
}

.statusRow {
    display:flex;
    justify-content:center;
    gap:8px;
    margin-top:15px;
    color:#aaa;
}

.bar {
    background:#1a1a1a;
    height:10px;
    border-radius:10px;
    overflow:hidden;
    margin:20px 0;
}
.progress {
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ff3c00,#ff7a00);
    transition:width 1s;
}

.timer {
    text-align:center;
    color:#ff3c00;
}

.message {
    text-align:center;
    margin-top:10px;
}

.loader {
    border:3px solid #222;
    border-top:3px solid #ff3c00;
    border-radius:50%;
    width:30px;
    height:30px;
    animation:spin 1s linear infinite;
    margin:20px auto;
}
@keyframes spin {
    0% {transform:rotate(0deg);}
    100% {transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="card">

<h2>JCC LAZER</h2>
<div class="sub">Order Tracking</div>

<input id="searchBox" placeholder="Enter Order ID">
<button onclick="searchOrder()">Track Order</button>

<div class="infoText">
    Timer Beings when Order is Placed
</div>

<div id="content"><div class="loader"></div></div>

<div class="statusRow">
<span id="statusIcon"></span>
<span id="statusText"></span>
</div>

<div class="bar">
<div class="progress" id="progressBar"></div>
</div>

<div class="timer" id="countdown"></div>

<div id="message" class="message">
🚚Out the door before this timer ends! 🚚🚚
    
</div>

</div>

<script>

const sheetURL = "https://api.sheetbest.com/sheets/7aac2704-6e80-426e-b461-4dcda49f0f3c";

async function loadOrder(id){

    document.getElementById("content").innerHTML = '<div class="loader"></div>';

    const res = await fetch(sheetURL);
    const data = await res.json();

    const found = data.find(row =>
        row["OrderID"]?.toUpperCase().trim() === id.toUpperCase().trim()
    );

    if(!found){
        document.getElementById("content").innerHTML = "Order not found";
        return;
    }

    document.getElementById("content").innerHTML = "<p>"+found.Name+"</p>";

    const statuses = [
        {text:"Order Received", icon:"📦"},
        {text:"Engraving", icon:"⚙️"},
        {text:"Finishing", icon:"✨"},
        {text:"Shipped", icon:"🚚"},
        {text:"Delivered", icon:"✔"}
    ];

    const stageIndex = parseInt(found.Stage) - 1;
    const current = statuses[stageIndex];

    document.getElementById("statusText").innerHTML = current.text;
    document.getElementById("statusIcon").innerHTML = current.icon;

    document.getElementById("progressBar").style.width =
        ((stageIndex)/(statuses.length-1))*100 + "%";

    if (!found.OrderDate) {
    document.getElementById("countdown").innerHTML = "Waiting for order...";
    document.getElementById("message").innerHTML = "Timer will start when order is placed ⏳";
    return;
    }
    const orderDate = new Date(found.OrderDate);
    let deliveryTime = orderDate.getTime() + (14*24*60*60*1000);

    if (window.timer) clearInterval(window.timer);

    window.timer = setInterval(()=>{
        let now = new Date().getTime();
        let distance = deliveryTime - now;

        if (distance <= 0) {

            document.getElementById("countdown").innerHTML = "Delivered";
            document.getElementById("statusText").innerHTML = "Delivered";
            document.getElementById("statusIcon").innerHTML = "✔";

            document.getElementById("progressBar").classList.add("progress-full");
            document.querySelector(".card").classList.add("delivered");

            document.getElementById("message").innerHTML =
                "Your order has been delivered 🎉";

            document.getElementById("statusText").classList.add("delivered-text");

            clearInterval(window.timer);
            return;
        }

        let d = Math.floor(distance/(1000*60*60*24));
        let h = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
        let m = Math.floor((distance%(1000*60*60))/(1000*60));
        let s = Math.floor((distance%(1000*60))/1000);

        document.getElementById("countdown").innerHTML =
            d+"d "+h+"h "+m+"m "+s+"s";

    },1000);
}

function searchOrder(){
    const id = document.getElementById("searchBox").value.trim();
    if(id.length > 0) loadOrder(id);
}

document.getElementById("searchBox").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        searchOrder();
    }
});

</script>

</body>
</html>
